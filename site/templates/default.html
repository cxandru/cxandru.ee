<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8"/>
        <meta name="author" content="Cass Alexandru"/>
        <link rel="stylesheet" type="text/css" href="./stylesheet.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <title>$title$</title>
        <style>
summary{list-style:none}
summary::-webkit-details-marker{display:none}
summary::before{content:'';display:inline-block;width:1em;height:1em;background:url(./assets/keyboard_arrow_right.svg) no-repeat center/contain;vertical-align:middle;margin-right:.3rem}
details[open]>summary::before{background-image:url(./assets/keyboard_arrow_down.svg)}
summary>h2{display:inline;margin:0}summary:has(>h2){font-size:2.2rem;line-height:1}
section p{width:55%}section dl,section ol,section ul{width:50%;-webkit-padding-start:5%}
footer.site-footer{border-top:1px solid #ccc;margin-top:3rem;padding:1.5rem 0;text-align:center;font-size:1rem;color:#888;letter-spacing:.05em;width:55%}
footer.site-footer a{color:#888;text-decoration:none;margin:0 .75rem;background:none;text-shadow:none}
footer.site-footer a:hover{color:#111}
@media(prefers-color-scheme:dark){footer.site-footer a:hover{color:#ddd}}
pre.biblatex>code{width:100%}
pre.biblatex{position:relative;cursor:pointer}
pre.biblatex::after{content:'';position:absolute;top:.5rem;right:.5rem;width:1.2rem;height:1.2rem;background:url(./assets/clipboard.svg) no-repeat center/contain;opacity:.3;transition:opacity .2s}
pre.biblatex:hover::after{opacity:.7}
pre.biblatex.copied::after{content:'Copied!';width:auto;height:auto;background:none;font-size:.8rem;color:#888}
.collapse-btn{display:block;width:55%;text-align:center;margin:1rem 0;background:none;border:none;cursor:pointer;opacity:.4;transition:opacity .2s}
.collapse-btn:hover{opacity:.8}
@media(max-width:760px){section p,footer.site-footer,.collapse-btn{width:100%}section dl,section ol,section ul{width:90%}h1{flex-wrap:wrap;justify-content:center}}
        </style>
        <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    </head>

    <body>
        <div id="content">
            <article>
                $if(heading)$
                  $heading$
                $elseif(title)$
                  <h1>$title$</h1>
                $endif$
                $if(subtitle)$
                  <h2>$subtitle$</h2>
                $endif$
                $if(date)$
                  <h3 class="numeral">$date$</h3>
                $endif$
                <section>
                    $body$
                </section>
            </article>
            <footer class="site-footer">  <!-- https://simpleicons.org/ -->
                <a rel="me" href="https://types.pl/@cxandru" aria-label="Mastodon"><img src="./assets/mastodon.svg" alt="Mastodon" width="24" height="24"></a>
                <a href="https://github.com/cxandru" aria-label="GitHub"><img src="./assets/github.svg" alt="GitHub" width="24" height="24"></a>
                <a href="https://scholar.google.de/citations?user=5uaOCrEAAAAJ" aria-label="Google Scholar"><img src="./assets/google-scholar.svg" alt="Google Scholar" width="24" height="24"></a>
                <a href="https://orcid.org/0009-0008-5210-2873" aria-label="ORCID"><img src="./assets/orcid.svg" alt="ORCID" width="24" height="24"></a>
            </footer>
        </div>
        <script>
document.querySelectorAll('section > details').forEach(function(details) {
    var btn = document.createElement('button');
    btn.className = 'collapse-btn';
    var img = document.createElement('img');
    img.src = './assets/keyboard_arrow_up.svg';
    img.alt = 'Collapse';
    img.width = 24;
    img.height = 24;
    btn.appendChild(img);
    btn.addEventListener('click', function() { details.open = false; details.scrollIntoView({behavior:'smooth'}); });
    details.appendChild(btn);
});
document.querySelectorAll('pre.biblatex').forEach(function(pre) {
    pre.addEventListener('click', function() {
        navigator.clipboard.writeText(pre.querySelector('code').textContent).then(function() {
            pre.classList.add('copied');
            setTimeout(function() { pre.classList.remove('copied'); }, 1500);
        });
    });
});
        </script>
    </body>

</html>
